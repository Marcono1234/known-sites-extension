name: Build extension
on:
  push:
    branches-ignore:
      # Ignore Dependabot branches because it will also open a pull request, which would cause the
      # workflow to redundantly run twice
      - dependabot/**
  pull_request:
  # Support manually running workflow, in which case the web-extension artifact is uploaded (see below)
  workflow_dispatch:

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Read version from `devEngines` entry
          node-version-file: 'package.json'
          cache: 'npm'
          # Explicitly specify path to also cover nested 'package-lock.json' for integration-tests
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: npm clean-install
      - name: Lint
        run: npm run lint
      - name: Package
        run: npm run package
      # Lint after building package to first compile all files
      - name: Lint extension
        run: npm run lint-web-ext

      - name: Upload extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # Only upload artifact if workflow was manually triggered
        if: github.event_name == 'workflow_dispatch'
        with:
          path: ./web-ext-artifacts/known_sites*.zip
          # Don't wrap extension ZIP file in another ZIP file
          archive: false
          if-no-files-found: error

      # Run integration tests after having uploaded extension artifact, to allow inspecting it
      # in case of test failures
      # These steps are run in the same workflow job to access the previously built extension artifact
      - name: Install integration tests dependencies
        working-directory: ./integration-tests
        run: npm clean-install
      - name: Lint integration tests
        working-directory: ./integration-tests
        run: npm run lint
      - name: Run integration tests
        working-directory: ./integration-tests
        run: npm run wdio
